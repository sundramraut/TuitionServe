<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Request Home Tuition</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

  <div class="max-w-md mx-auto mt-10 bg-white p-6 rounded shadow">
    <h2 class="text-xl font-bold mb-4">Request Home Tuition</h2>

    <form id="homeTuitionForm" class="flex flex-col gap-3">

      <input type="text" placeholder="Full Name" id="name" class="border p-2" required>
      
      <input type="text" placeholder="Class (e.g. 10, 11, 12)" id="class" class="border p-2" required>

      <input type="text" placeholder="Subject Needed" id="subject" class="border p-2" required>

      <input type="text" placeholder="Location" id="location" class="border p-2" required>

      <input type="text" placeholder="Contact Number" id="contact" class="border p-2" required>

      <textarea placeholder="Additional Details" id="details" class="border p-2"></textarea>

      <button type="submit" class="bg-blue-500 text-white p-2 rounded">
        Submit Request
      </button>

    </form>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="js/supabase.js"></script>

  <script src="js/form.js"></script>
</body>
</html>
