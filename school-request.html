<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>School Teacher Request</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

  <div class="max-w-md mx-auto mt-10 bg-white p-6 rounded shadow">
    <h2 class="text-xl font-bold mb-4">Request Teacher for School</h2>

    <form id="schoolForm" class="flex flex-col gap-3">

      <input type="text" placeholder="School Name" id="schoolName" class="border p-2" required>

      <input type="text" placeholder="Subject Required" id="subject" class="border p-2" required>

      <input type="text" placeholder="Location" id="location" class="border p-2" required>

      <input type="text" placeholder="Contact Number" id="contact" class="border p-2" required>

      <textarea placeholder="More Details" id="details" class="border p-2"></textarea>

      <button type="submit" class="bg-purple-500 text-white p-2 rounded">
        Submit Request
      </button>

    </form>
  </div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/form.js"></script>
  
</body>
</html>
