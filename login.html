<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

  <div class="max-w-md mx-auto mt-10 bg-white p-6 shadow rounded">
    <h2 class="text-xl font-bold mb-4">Login</h2>

    <form id="loginForm" class="flex flex-col gap-3">
      <input type="email" id="email" placeholder="Email" class="border p-2" required>
      <input type="password" id="password" placeholder="Password" class="border p-2" required>

      <button class="bg-blue-500 text-white p-2 rounded">
        Login
      </button>
    </form>

    <p class="mt-3">
      New user? <a href="signup.html" class="text-green-500">Signup</a>
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>

</body>
</html>
