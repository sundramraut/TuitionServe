<!DOCTYPE html>
<html>
<head>
  <title>Tuition Platform</title>
</head>
<body>
  <h2>Teacher Login / Signup</h2>

<input id="email" placeholder="Email" /><br/>
<input id="password" type="password" placeholder="Password" /><br/>

<button onclick="signUp()">Sign Up</button>
<button onclick="login()">Login</button>

<hr/>

<h1>Find Home Tutor</h1>

<form id="form">
  <input placeholder="Name" id="name" /><br/>
  <input placeholder="Phone" id="phone" /><br/>
  <input placeholder="Subject" id="subject" /><br/>
  <input placeholder="Class" id="class" /><br/>
  <input placeholder="Location" id="location" /><br/>
  <textarea placeholder="Description" id="desc"></textarea><br/>

  <button type="submit">Submit</button>
</form>
  <h2>Available Tuition Jobs</h2>
<div id="jobs"></div>

<script src="app.js"></script>

</body>
</html>
